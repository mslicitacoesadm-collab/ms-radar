name: Sincronizar radar de licitações

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9,13,17,21 * * 1-5"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run sync
        env:
          PNCP_SEARCH_URL: ${{ secrets.PNCP_SEARCH_URL }}
          PNCP_TIMEOUT: ${{ secrets.PNCP_TIMEOUT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.services.sync_job --query "" --days 30

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/radar_licitacoes.db
          if git diff --cached --quiet; then
            echo "Sem alterações no banco."
          else
            git commit -m "chore: atualiza base do radar via PNCP"
            git push
          fi

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: radar-licitacoes-db
          path: data/radar_licitacoes.db
