name: Atualizar Radar Licita Pro

on:
  workflow_dispatch:
  schedule:
    - cron: '10 8,12,16,20 * * 1-5'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sincronizar base
        env:
          PNCP_SEARCH_URL: ${{ secrets.PNCP_SEARCH_URL }}
          PNCP_TIMEOUT: ${{ secrets.PNCP_TIMEOUT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m app.services.sync_job --days 30 --demo-fallback

      - name: Commit banco atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/radar_licitacoes.db
          if git diff --cached --quiet; then
            echo "Sem alterações para commitar."
          else
            git commit -m "chore: atualiza base do Radar Licita Pro"
            git push
          fi
