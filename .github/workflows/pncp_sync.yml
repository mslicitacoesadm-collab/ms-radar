name: pncp-sync

on:
  workflow_dispatch:
  schedule:
    - cron: '15 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Coleta resumida
        env:
          PNCP_BASE_URL: ${{ secrets.PNCP_BASE_URL }}
          PNCP_CONNECT_TIMEOUT: ${{ secrets.PNCP_CONNECT_TIMEOUT }}
          PNCP_READ_TIMEOUT: ${{ secrets.PNCP_READ_TIMEOUT }}
        run: python -c "from app.services.sync_job import sync_open_summaries; print(sync_open_summaries())"
      - name: Enriquecer lote pequeno
        env:
          PNCP_BASE_URL: ${{ secrets.PNCP_BASE_URL }}
          PNCP_CONNECT_TIMEOUT: ${{ secrets.PNCP_CONNECT_TIMEOUT }}
          PNCP_READ_TIMEOUT: ${{ secrets.PNCP_READ_TIMEOUT }}
        run: python -c "from app.services.sync_job import enrich_pending_details; print(enrich_pending_details(batch_size=20))"
      - name: Commit da base atualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.db || true
          git commit -m "Atualiza base PNCP" || exit 0
          git push
